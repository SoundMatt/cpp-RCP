name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build and test (cross-platform) ──────────────────────────────────────────
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: clang-14
            std: 17
            cc: clang-14
            cxx: clang++-14
          - os: ubuntu-22.04
            compiler: gcc-12
            std: 17
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-22.04
            compiler: gcc-12
            std: 20
            cc: gcc-12
            cxx: g++-12
          - os: macos-14
            compiler: clang
            std: 17
            cc: clang
            cxx: clang++
          - os: windows-2022
            compiler: msvc
            std: 17
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Install tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -j1

  # ── Static analysis ───────────────────────────────────────────────────────────
  lint:
    name: clang-tidy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build clang-tidy

      - name: Configure
        env:
          CC: clang-14
          CXX: clang++-14
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja

      - name: Build (generate compile_commands.json)
        run: cmake --build build --parallel

      - name: Run clang-tidy
        run: |
          find include tests -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-tidy -p build --warnings-as-errors='*' || true

  # ── Coverage ──────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (LCOV)
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build lcov

      - name: Configure (coverage build)
        env:
          CC: gcc-12
          CXX: g++-12
        run: |
          cmake -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -G Ninja

      - name: Build
        run: cmake --build build-cov --parallel

      - name: Test
        run: ctest --test-dir build-cov --output-on-failure -j1

      - name: Collect LCOV data
        run: |
          lcov --capture \
            --directory build-cov \
            --output-file coverage.info
          lcov --remove coverage.info \
            '*/tests/*' '*/catch2/*' '*/FetchContent/*' '*/cmake-build*/*' \
            --output-file coverage.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  # ── cpp-FuSa safety checks ────────────────────────────────────────────────────
  cpfusa:
    name: cpp-FuSa safety check
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build

      - name: Build cpp-FuSa
        run: |
          git clone --depth=1 https://github.com/SoundMatt/cpp-FuSa /tmp/cpfusa
          cmake -B /tmp/cpfusa/build -S /tmp/cpfusa \
            -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build /tmp/cpfusa/build --parallel

      - name: cpfusa check (0 errors required)
        run: /tmp/cpfusa/build/cpfusa check --dir .

      - name: cpfusa trace (all requirements must be traced)
        run: /tmp/cpfusa/build/cpfusa trace --dir .

      - name: Verify required safety artifacts are present
        run: |
          missing=0
          for f in \
            .fusa.json \
            .fusa-reqs.json \
            .fusa-hara.json \
            .fusa-problems.json \
            .fusa-iec62443.json \
            SECURITY.md \
            INCIDENT-RESPONSE.md \
            SAFETY_PLAN.md \
            .github/CODEOWNERS; do
            if [ ! -f "$f" ]; then
              echo "::error::Required safety artifact missing: $f"
              missing=$((missing + 1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Upload check report
        uses: actions/upload-artifact@v4
        with:
          name: safety-evidence
          path: check-report.json
